aid: kubeedge
name: KubeEdge
description: >-
  KubeEdge is a CNCF graduated project that extends Kubernetes to edge
  computing. It provides infrastructure support for networking, application
  deployment, and metadata synchronization between cloud and edge. KubeEdge
  enables containerized application orchestration at the edge with offline
  autonomy, ensuring edge nodes continue functioning when disconnected from
  the cloud.
url: https://kubeedge.io
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
