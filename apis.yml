apis:
  - aid: kubeedge:kubeedge-api
    name: KubeEdge Edge API
    description: >-
      KubeEdge extends the Kubernetes API to manage edge nodes and devices.
      It includes custom resources for device management, edge application
      deployment, and node grouping. The EdgeController and DeviceController
      synchronize metadata between the cloud and edge components, enabling
      Kubernetes-native management of edge workloads and IoT devices.
    humanURL: https://kubeedge.io/docs/
    properties:
